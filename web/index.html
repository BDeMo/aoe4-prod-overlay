<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AoE4 Production Overlay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="overlay-panel">
        <!-- Title Bar -->
        <div id="title-bar">
            <span class="title">AoE4 Prod Calc <span style="font-size:9px;color:var(--text-muted);font-weight:normal">by SamJ</span></span>
            <div class="controls">
                <button class="settings-btn" onclick="toggleSettingsDropdown()" title="Settings">&#9881;</button>
                <button class="compact-btn" onclick="toggleCompactMode()" title="Compact mode (Ctrl+M)">&#9724;</button>
                <button class="min-btn" onclick="minimizePanel()" title="Hide (Ctrl+H)">&#8722;</button>
                <button class="close-btn" onclick="closePanel()" title="Close">&#10005;</button>
            </div>
        </div>

        <!-- Settings Dropdown (gear button — rarely used items only) -->
        <div id="settings-dropdown">
            <div class="settings-dropdown-content">
                <div class="subsection-label" style="display:flex;justify-content:space-between;align-items:center">
                    Keyboard Shortcuts
                    <button class="clear-btn" onclick="resetHotkeys()">Reset</button>
                </div>
                <div id="hotkey-settings"></div>

                <div class="subsection-label">Layout</div>
                <div class="setting-row">
                    <label>
                        <input type="checkbox" id="toggle-opponent-panel" onchange="toggleOpponentPanel()">
                        Show opponent info panel
                    </label>
                </div>
                <div class="setting-row">
                    <label>
                        <input type="checkbox" id="toggle-auto-detect" onchange="toggleAutoDetect()" checked>
                        Auto-detect match (log watcher)
                    </label>
                </div>
                <div class="setting-row">
                    <label>
                        <input type="checkbox" id="toggle-ocr" onchange="toggleOCR()">
                        Screen OCR (experimental)
                    </label>
                </div>
                <div class="setting-row">
                    <label>
                        <input type="checkbox" id="toggle-passive-auto" onchange="togglePassiveAuto()">
                        Auto-detect passive income
                    </label>
                </div>

                <div class="subsection-label">Data</div>
                <div class="setting-row">
                    <button class="reset-btn" onclick="resetAllSettings()">Reset All Settings</button>
                </div>
            </div>
        </div>

        <!-- Content -->
        <div id="content">
            <!-- Villager Requirements -->
            <div class="section">
                <div class="section-label">Villager Requirements</div>
                <div id="villager-output">
                    <div class="res-header-row">
                        <span class="res-h-label"></span>
                        <span class="res-h-need">Need</span>
                        <span class="res-h-passive" id="res-h-passive" style="display:none">Pas</span>
                        <span class="res-h-have">Have</span>
                        <span class="res-h-diff">±</span>
                    </div>
                    <div class="resource-row">
                        <div class="resource-icon food"></div>
                        <span class="resource-label">Food</span>
                        <div class="resource-bar-track"><div class="resource-bar food" id="bar-food" style="width:0%"></div></div>
                        <span class="resource-value food" id="val-food">0.0</span>
                        <span class="res-passive" id="passive-food" style="display:none"></span>
                        <input type="number" class="res-actual" id="actual-food" min="0" max="99" value="0" oninput="onActualVillChange()" onblur="onActualVillChange()">
                        <button class="ocr-pick-btn" onclick="ocrPick('food')" title="Pick from screen">📷</button>
                        <span class="res-diff" id="diff-food"></span>
                    </div>
                    <div class="resource-row">
                        <div class="resource-icon wood"></div>
                        <span class="resource-label">Wood</span>
                        <div class="resource-bar-track"><div class="resource-bar wood" id="bar-wood" style="width:0%"></div></div>
                        <span class="resource-value wood" id="val-wood">0.0</span>
                        <span class="res-passive" id="passive-wood" style="display:none"></span>
                        <input type="number" class="res-actual" id="actual-wood" min="0" max="99" value="0" oninput="onActualVillChange()" onblur="onActualVillChange()">
                        <button class="ocr-pick-btn" onclick="ocrPick('wood')" title="Pick from screen">📷</button>
                        <span class="res-diff" id="diff-wood"></span>
                    </div>
                    <div class="resource-row">
                        <div class="resource-icon gold"></div>
                        <span class="resource-label">Gold</span>
                        <div class="resource-bar-track"><div class="resource-bar gold" id="bar-gold" style="width:0%"></div></div>
                        <span class="resource-value gold" id="val-gold">0.0</span>
                        <span class="res-passive" id="passive-gold" style="display:none"></span>
                        <input type="number" class="res-actual" id="actual-gold" min="0" max="99" value="0" oninput="onActualVillChange()" onblur="onActualVillChange()">
                        <button class="ocr-pick-btn" onclick="ocrPick('gold')" title="Pick from screen">📷</button>
                        <span class="res-diff" id="diff-gold"></span>
                    </div>
                    <div class="resource-row">
                        <div class="resource-icon stone"></div>
                        <span class="resource-label">Stone</span>
                        <div class="resource-bar-track"><div class="resource-bar stone" id="bar-stone" style="width:0%"></div></div>
                        <span class="resource-value stone" id="val-stone">0.0</span>
                        <span class="res-passive" id="passive-stone" style="display:none"></span>
                        <input type="number" class="res-actual" id="actual-stone" min="0" max="99" value="0" oninput="onActualVillChange()" onblur="onActualVillChange()">
                        <button class="ocr-pick-btn" onclick="ocrPick('stone')" title="Pick from screen">📷</button>
                        <span class="res-diff" id="diff-stone"></span>
                    </div>
                    <div class="total-row">
                        <span class="total-label">Total Villagers</span>
                        <span class="total-value" id="val-total">0.0</span>
                        <button class="ocr-scan-all-btn" onclick="ocrScanAll()" title="Re-scan all saved positions">🔄</button>
                    </div>
                </div>
            </div>

            <!-- Civilization Selector -->
            <div class="section collapsible-section" id="section-civ">
                <div class="section-label">Civilization</div>
                <select id="civ-selector" onchange="onCivChange(this.value)"></select>
            </div>

            <!-- Unit Grid -->
            <div class="section collapsible-section" id="section-units">
                <div class="section-label">Units</div>
                <div id="unit-grid"></div>
            </div>

            <!-- Selected Units -->
            <div class="section" id="section-queue">
                <div class="section-label" style="display:flex;justify-content:space-between;align-items:center">
                    Production Queue
                    <button class="clear-btn" onclick="clearQueue()" title="Clear all">Clear</button>
                </div>
                <div id="selected-units">
                    <div class="empty-state">Click units above to add them</div>
                </div>
            </div>

            <!-- Modifiers -->
            <div class="section collapsible-section" id="section-modifiers">
                <div class="section-label" style="display:flex;justify-content:space-between;align-items:center">
                    Modifiers
                    <button class="clear-btn" onclick="resetModifiers()">Reset</button>
                </div>
                <div class="setting-row">
                    <label>Food source:</label>
                    <select id="food-source" onchange="onFoodSourceChange(this.value)">
                        <option value="FARM">Farm</option>
                        <option value="SHEEP">Sheep</option>
                        <option value="BERRY">Berry</option>
                        <option value="DEER">Deer</option>
                        <option value="CATTLE">Cattle</option>
                    </select>
                </div>
                <div id="common-modifiers-group"></div>
                <div id="civ-modifiers-group"></div>
            </div>

            <!-- Passive Income Sources (civ-specific) -->
            <div class="section collapsible-section" id="passive-income-section" style="display:none">
                <div class="section-label">Passive Income Sources</div>
                <div id="passive-income-sources"></div>
            </div>

            <!-- Opponent Info (aoe4world.com API) -->
            <div class="section" id="opponent-section" style="display:none">
                <div class="section-label" style="display:flex;justify-content:space-between;align-items:center">
                    Player Lookup
                    <button class="clear-btn" onclick="clearOpponentData()">Clear</button>
                </div>
                <div class="player-search-row">
                    <input type="text" id="player-name-input" placeholder="Enter player name..."
                           oninput="debouncedPlayerSearch()" onkeydown="if(event.key==='Enter')onPlayerNameSubmit()">
                </div>
                <div id="opponent-players"></div>
            </div>
        </div>
        <!-- Resize grip -->
        <div id="resize-grip" title="Drag to resize">⋮⋮</div>
    </div>

    <script src="data.js"></script>
    <script src="calculator.js"></script>
    <script src="app.js"></script>
</body>
</html>
